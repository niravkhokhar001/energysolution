<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon — Solar Energy Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sun-core:    #e8420a;
    --sun-inner:   #f26d1a;
    --sun-mid:     #f5920a;
    --sun-outer:   #f7b500;
    --sun-ray:     #ffd43b;
    --bg-dark:     #0a0a0f;
    --bg-mid:      #0f0f1a;
    --text-light:  #fff8f0;
    --text-muted:  #c8a882;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    font-family: 'Outfit', sans-serif;
    color: var(--text-light);
  }

  /* ── CANVAS ── */
  #bg { position: fixed; inset: 0; z-index: 0; }

  /* ── LOGO SVG (animated sun) ── */
  .sun-wrap {
    position: fixed;
    inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .sun-svg {
    width: min(70vw, 70vh);
    height: min(70vw, 70vh);
    opacity: 0.18;
    animation: sunSpin 40s linear infinite, sunPulse 6s ease-in-out infinite alternate;
    filter: blur(2px);
  }

  @keyframes sunSpin  { to { transform: rotate(360deg); } }
  @keyframes sunPulse { from { opacity: .12; transform: scale(.96) rotate(0deg); }
                        to   { opacity: .24; transform: scale(1.04) rotate(360deg); } }

  /* ── PARTICLES (CSS only) ── */
  .particles { position: fixed; inset: 0; z-index: 2; overflow: hidden; pointer-events: none; }
  .p {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: .6; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ── MAIN CONTENT ── */
  .page {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: grid;
    place-items: center;
    perspective: 1200px;
  }

  .card {
    text-align: center;
    padding: clamp(2rem, 5vw, 5rem) clamp(2rem, 6vw, 7rem);
    background: linear-gradient(135deg,
      rgba(255,255,255,.04) 0%,
      rgba(248,165,10,.04) 100%);
    border: 1px solid rgba(247,181,0,.15);
    border-radius: 2rem;
    backdrop-filter: blur(12px);
    box-shadow:
      0 0 80px rgba(242,109,26,.15),
      0 0 200px rgba(232,66,10,.08),
      inset 0 1px 0 rgba(255,255,255,.08);
    animation: cardFloat 8s ease-in-out infinite alternate, fadeInCard 1.4s ease forwards;
    opacity: 0;
    transform-style: preserve-3d;
    max-width: 680px; width: 90%;
  }

  @keyframes cardFloat {
    from { transform: translateY(0px) rotateX(1deg); }
    to   { transform: translateY(-18px) rotateX(-1deg); }
  }
  @keyframes fadeInCard {
    from { opacity: 0; transform: translateY(40px) scale(.95); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  /* Logo mini */
  .logo-mini {
    width: 72px; height: 72px;
    margin: 0 auto 1.6rem;
    animation: spinSlowly 20s linear infinite;
    filter: drop-shadow(0 0 18px rgba(242,109,26,.7));
  }
  @keyframes spinSlowly { to { transform: rotate(360deg); } }

  /* Badge */
  .badge {
    display: inline-block;
    padding: .3rem 1.1rem;
    background: linear-gradient(90deg, var(--sun-core), var(--sun-outer));
    border-radius: 999px;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 1.4rem;
    box-shadow: 0 0 20px rgba(242,109,26,.5);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.2rem, 9vw, 7.5rem);
    line-height: .9;
    letter-spacing: .02em;
    background: linear-gradient(160deg,
      #fff8f0 0%, var(--sun-ray) 40%, var(--sun-outer) 70%, var(--sun-core) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1.2rem;
    filter: drop-shadow(0 2px 24px rgba(247,181,0,.3));
  }

  .sub {
    font-size: clamp(.9rem, 2.2vw, 1.15rem);
    font-weight: 300;
    color: var(--text-muted);
    max-width: 420px;
    margin: 0 auto 2.6rem;
    line-height: 1.75;
  }

  /* Contact email */
  .contact-email {
    display: inline-flex; align-items: center; gap: .55rem;
    margin-top: .4rem;
    font-size: clamp(.85rem, 2vw, 1rem);
    font-weight: 400;
    color: var(--sun-outer);
    text-decoration: none;
    letter-spacing: .03em;
    transition: color .25s, filter .25s;
  }
  .contact-email:hover {
    color: #fff;
    filter: drop-shadow(0 0 10px rgba(247,181,0,.7));
  }
  .contact-email .icon {
    width: 18px; height: 18px; opacity: .85;
  }

  /* ── ENERGY RING ── */
  .ring-wrap {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .ring {
    border-radius: 50%;
    border: 1px solid rgba(247,181,0,.06);
    position: absolute;
    animation: ringPulse ease-in-out infinite alternate;
  }
  @keyframes ringPulse {
    from { transform: scale(1);    opacity: .5; }
    to   { transform: scale(1.06); opacity: .12; }
  }

</style>
</head>
<body>

    <circle cx="100" cy="38"  r="8"  fill="#f7b500"/>

<!-- Expanding rings -->
<div class="ring-wrap">

<!-- Main content -->
<div class="page">
  <div class="card">
    <!-- Mini logo -->
    <svg class="logo-mini" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="26" fill="#e8420a"/>
      <circle cx="100" cy="63"  r="11" fill="#f26d1a"/>
      <circle cx="127" cy="72"  r="11" fill="#f26d1a"/>
      <circle cx="137" cy="100" r="11" fill="#f26d1a"/>
      <circle cx="127" cy="128" r="11" fill="#f26d1a"/>
      <circle cx="100" cy="137" r="11" fill="#f26d1a"/>

      <circle cx="63"  cy="100" r="11" fill="#f26d1a"/>

<!-- THREE.JS via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── THREE.JS 3D scene ──
(function() {
  const canvas = document.getElementById('bg');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 28);

  // Colours matching logo
  const colors = [0xe8420a, 0xf26d1a, 0xf5920a, 0xf7b500, 0xffd43b];

  // ── Orbiting spheres (sun dot system) ──
  const orbits = [];
  const RINGS = [
    { r: 5,  count: 8,  size: .22, speed: .4,  col: 0xf26d1a },
    { r: 9,  count: 12, size: .18, speed: .25, col: 0xf5920a },
    { r: 14, count: 16, size: .14, speed: .15, col: 0xf7b500 },
    { r: 20, count: 20, size: .10, speed: .09, col: 0xffd43b },
  ];

  RINGS.forEach(ring => {
    const geo = new THREE.SphereGeometry(ring.size, 16, 16);
    const mat = new THREE.MeshStandardMaterial({
      color: ring.col, emissive: ring.col, emissiveIntensity: .6,
      roughness: .3, metalness: .1
    });
    const group = new THREE.Group();
    for (let i = 0; i < ring.count; i++) {
      const mesh = new THREE.Mesh(geo, mat.clone());
      const angle = (i / ring.count) * Math.PI * 2;
      // Tilt each ring slightly
      mesh.userData = { angle, r: ring.r, tilt: (Math.random() - .5) * .5 };
      group.add(mesh);
    }
    group.userData.speed = ring.speed + (Math.random() - .5) * .05;
    group.userData.tiltX = (Math.random() - .5) * .6;
    group.userData.tiltZ = (Math.random() - .5) * .3;
    group.rotation.x = group.userData.tiltX;
    group.rotation.z = group.userData.tiltZ;
    scene.add(group);
    orbits.push(group);
  });

  // Centre glowing sphere (core)
  const coreGeo = new THREE.SphereGeometry(1.6, 32, 32);
  const coreMat = new THREE.MeshStandardMaterial({
    color: 0xe8420a, emissive: 0xe8420a, emissiveIntensity: 1,
    roughness: .2, metalness: .0
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  scene.add(core);

  // Glow sprite around core
  const spriteMat = new THREE.SpriteMaterial({
    map: (() => {
      const c = document.createElement('canvas'); c.width = c.height = 128;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(64,64,0,64,64,64);
      g.addColorStop(0,   'rgba(242,109,26,0.9)');
      g.addColorStop(.3,  'rgba(247,181,0,0.4)');
      g.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
      return new THREE.CanvasTexture(c);
    })(),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const glow = new THREE.Sprite(spriteMat);
  glow.scale.set(12, 12, 1);
  scene.add(glow);

  // Distant star field
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(3000);
  for (let i = 0; i < 3000; i++) {
    starPos[i] = (Math.random() - .5) * 300;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffe8aa, size: .12, sizeAttenuation: true });
  scene.add(new THREE.Points(starGeo, starMat));

  // Lights
  scene.add(new THREE.AmbientLight(0xfff0d0, .4));
  const sun = new THREE.PointLight(0xf7b500, 4, 60);
  scene.add(sun);

  // Mouse parallax
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = (e.clientX / window.innerWidth  - .5) * 2;
    my = (e.clientY / window.innerHeight - .5) * 2;
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  let t = 0;
  (function animate() {
    requestAnimationFrame(animate);
    t += .008;

    // Rotate orbit groups & update sphere positions
    orbits.forEach((group, gi) => {
      group.rotation.y += group.userData.speed * .008;
      group.children.forEach((mesh, i) => {
        const angle = mesh.userData.angle + t * group.userData.speed;
        mesh.position.set(
          Math.cos(angle) * mesh.userData.r,
          Math.sin(mesh.userData.tilt + t * .15) * 1.2,
          Math.sin(angle) * mesh.userData.r
        );
      });
    });

    // Core breathe
    const s = 1 + Math.sin(t * 1.5) * .05;
    core.scale.set(s, s, s);
    glow.scale.set(12 + Math.sin(t) * 1.5, 12 + Math.sin(t) * 1.5, 1);

    // Camera parallax
    camera.position.x += (mx * 2 - camera.position.x) * .03;
    camera.position.y += (-my * 2 - camera.position.y) * .03;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  })();
})();

// ── CSS floating particles ──
(function spawnParticles() {
  const container = document.getElementById('particles');
  const cols = ['#e8420a','#f26d1a','#f5920a','#f7b500','#ffd43b'];
  for (let i = 0; i < 38; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    const sz = Math.random() * 8 + 3;
    p.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      opacity:${Math.random()*.6+.2};
      animation-duration:${Math.random()*14+8}s;
      animation-delay:-${Math.random()*14}s;
      filter: blur(${Math.random()>0.6?'1px':'0px'});
    `;
    container.appendChild(p);
  }
})();

</script>
</body>
</html>
